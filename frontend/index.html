<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>She Can Foundation</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="container">
            <div class="card">
                <h1>She Can Foundation</h1>
            
                <p class="subtitle">A women empowerment initiative.</p>
            
                <form id="contact-form">
                    <input type="text" id="name" placeholder="Enter your name" required autofocus autocomplete="off">
                    <input type="email" id="email" placeholder="Enter your email" required autocomplete="off">
                    <textarea id="message" placeholder="Enter your message" required></textarea>
                    <button type="submit" id="submit-btn">Submit</button>
                </form>
                <p id="success-message"></p>
            </div>
        
            <footer>&copy; 2026 She Can Foundation</footer>
        </div>
    
        <script src="script.js"></script>
    
    </body>
</html>
