<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin Dashboard</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: Arial, sans-serif;
            }
        
            body {
                background-color: #f5f5f5;
                padding: 40px;
            }
        
            h1 {
                margin-bottom: 30px;
                text-align: center;
            }
        
            table {
                width: 100%;
                border-collapse: collapse;
                background-color: white;
                box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            }
        
            th, td {
                padding: 15px;
                border-bottom: 1px solid #ddd;
                text-align: left;
            }
        
            th {
                background-color: #7f5af0;
                color: white;
            }
        
            tr:hover {
                background-color: #f0f0f0;
            }
        </style>
    </head>
    <body>
    
        <h1>Form Submissions</h1>
    
        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Message</th>
                <th>Submitted At</th>
            </tr>
            {{range .}}
            <tr>
                <td>{{.ID}}</td>
                <td>{{.Name}}</td>
                <td>{{.Email}}</td>
                <td>{{.Message}}</td>
                <td>{{.CreatedAt}}</td>
            </tr>
            {{end}}
        </table>
    </body>
</html>
