<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin Dashboard</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: Arial, sans-serif;
            }
        
            body {
                background-color: #f5f5f5;
                padding: 40px;
            }
        
            h1 {
                margin-bottom: 30px;
                text-align: center;
            }
        
            table {
                width: 100%;
                border-collapse: collapse;
                background-color: white;
                box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            }
        
            th, td {
                padding: 15px;
                border-bottom: 1px solid #ddd;
                text-align: left;
            }
        
            th {
                background-color: #7f5af0;
                color: white;
            }
        
            tr:hover {
                background-color: #f0f0f0;
            }

            .delete-btn {
                padding: 8px 14px;
                border: none;
                border-radius: 8px;
                background-color: #e63946;
                color: white;
                cursor: pointer;
                transition: 0.3s;
            }

            .delete-btn:hover {
                opacity: 0.85;
            }

            .top-bar { 
                display: flex;
                justify-content: flex-end;
                margin-bottom: 20px;
            }

            .logout-btn {
                padding: 10px 16px;
                border: none;
                border-radius: 8px;
                background-color: #222;
                color: white;
                cursor: pointer;
                transition: 0.3s;
            }

            .logout-btn:hover {
                opacity: 0.85;
            }
        </style>
    </head>
    <body>
    
        <h1>Form Submissions</h1>

        <div class="top-bar">
            <a href="/logout">
                <button class="logout-btn">Logout</button>
            </a>
        </div>
    
        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Message</th>
                <th>Submitted At</th>
                <th>Action</th>
            </tr>
            {{range .}}
            <tr>
                <td>{{.ID}}</td>
                <td>{{.Name}}</td>
                <td>{{.Email}}</td>
                <td>{{.Message}}</td>
                <td>{{.CreatedAt}}</td>
                <td>
                    <form action="/delete?id={{.ID}}" method="POST">
                        <button class="delete-btn">Delete</button>
                    </form>
                </td>
            </tr>
            {{end}}
        </table>
    </body>
</html>
